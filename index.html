<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D0D10">
<title>QuestLife</title>
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22QuestLife%22,%22short_name%22:%22QuestLife%22,%22display%22:%22standalone%22,%22background_color%22:%22%230D0D10%22,%22theme_color%22:%22%230D0D10%22}">
<style>
  :root{
    --bg:#0D0D10;
    --card:#1A1A1F;
    --card-2:#232329;
    --line:#2A2A31;
    --accent:#FF7A1A;   /* Fortschritt / Status (XP, Level, Streak, Ratings) */
    --action:#8B1E2E;   /* interaktive Buttons / primäre CTAs */
    --good:#6BFF9D;
    --bad:#FF4D6B;
    --text:#F5F0EA;
    --muted:#8A8A94;
    --radius:16px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  body{padding:16px;padding-bottom:90px;max-width:520px;margin:0 auto;}

  .display{font-weight:800;letter-spacing:-0.03em;}
  h1{font-size:1.25rem;font-weight:800;letter-spacing:-0.02em;margin:0 0 16px 0;}
  h2{font-size:.8rem;color:var(--muted);font-weight:700;letter-spacing:.06em;
    text-transform:uppercase;margin:26px 0 12px 0;}
  .muted{color:var(--muted);}
  .small{font-size:.8rem;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
  .row{display:flex;align-items:center;gap:12px;}
  .between{justify-content:space-between;}
  .pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;
    background:var(--card-2);font-size:.72rem;color:var(--muted);font-weight:600;}

  button{font-family:inherit;cursor:pointer;border:none;border-radius:12px;padding:11px 15px;
    font-size:.9rem;font-weight:700;color:var(--text);}
  .btn-primary{background:var(--action);color:#F5F0EA;}
  .btn-ghost{background:var(--card-2);color:var(--text);}
  .btn-danger{background:var(--bad);color:#0D0D10;}
  .btn-sm{padding:7px 12px;font-size:.8rem;}
  .addbtns{display:flex;gap:6px;}
  input,select{font-family:inherit;background:var(--card-2);border:1px solid var(--line);
    color:var(--text);border-radius:10px;padding:10px 12px;font-size:.9rem;width:100%;}
  label{font-size:.78rem;color:var(--muted);display:block;margin:12px 0 5px;font-weight:600;}

  /* ---- Header / Charakter ---- */
  #charCard{background:linear-gradient(160deg,#20141a,var(--card));position:relative;overflow:hidden;}
  .lvl-line{display:flex;align-items:baseline;gap:10px;}
  .lvl-line b{font-size:1.05rem;font-weight:800;letter-spacing:-.02em;}
  .rank{font-weight:800;font-size:.72rem;letter-spacing:.09em;}
  .day-big{text-align:right;line-height:1;flex-shrink:0;}
  .day-big .wd{display:block;font-size:.72rem;color:var(--muted);font-weight:700;letter-spacing:.04em;margin-bottom:5px;}
  .day-big .num{font-size:2.4rem;color:var(--accent);}
  .day-big .of{font-size:.95rem;color:var(--muted);font-weight:700;}
  .xpbar-track{background:var(--card-2);border-radius:999px;height:9px;overflow:hidden;margin-top:8px;}
  .xpbar-fill{background:linear-gradient(90deg,var(--accent),#ffb26b);height:100%;border-radius:999px;transition:width .4s ease;}

  .attr-row{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:.82rem;cursor:pointer;}
  .attr-name{width:98px;color:var(--muted);flex-shrink:0;font-weight:600;font-size:.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .attr-lvl{width:40px;color:var(--accent);font-weight:800;font-size:.76rem;flex-shrink:0;}
  .attr-track{flex:1;background:var(--card-2);border-radius:999px;height:7px;overflow:hidden;}
  .attr-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--good),#3ad07a);}
  .attr-val{width:40px;text-align:right;color:var(--text);font-weight:700;}
  .attr-chev{color:var(--muted);font-size:.9rem;}

  /* ---- Wochenbelohnung ---- */
  #rewardCard label{margin-top:0;}
  #rewardStatus{margin-top:8px;}

  /* ---- Formular ---- */
  .stars{display:flex;gap:8px;font-size:1.7rem;line-height:1;user-select:none;}
  .star{color:var(--card-2);cursor:pointer;transition:color .12s,transform .12s;}
  .star.on{color:var(--accent);}
  .star:active{transform:scale(1.15);}
  .daychips{display:flex;gap:5px;}
  .daychip{flex:1;padding:9px 0;border-radius:10px;background:var(--card-2);color:var(--muted);
    font-weight:700;font-size:.78rem;border:1px solid var(--line);}
  .daychip.on{background:var(--accent);color:#0D0D10;border-color:var(--accent);}

  /* ---- Quest-Karten ---- */
  .quest-card{position:relative;height:118px;border-radius:var(--radius);overflow:hidden;
    border:1px solid var(--line);margin-bottom:12px;cursor:pointer;}
  .quest-card .quest-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block;background:var(--card-2);}
  .quest-overlay{position:absolute;inset:0;padding:12px 14px;display:flex;flex-direction:column;
    justify-content:space-between;transition:opacity .15s;
    background:linear-gradient(180deg,rgba(13,13,16,.25),rgba(13,13,16,.65));}
  .quest-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .quest-icon{width:38px;height:38px;border-radius:11px;background:rgba(13,13,16,.35);
    backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;
    border:1px solid rgba(245,240,234,.18);}
  .quest-icon svg{width:22px;height:22px;}
  .quest-badges{display:flex;flex-direction:column;gap:5px;align-items:flex-end;}
  .quest-title{font-weight:800;font-size:1.05rem;letter-spacing:-.02em;
    text-shadow:0 1px 6px rgba(0,0,0,.7);}
  .quest-sub{display:flex;gap:8px;margin-top:3px;font-size:.72rem;color:#e8e0d6;
    text-shadow:0 1px 4px rgba(0,0,0,.7);font-weight:600;flex-wrap:wrap;}
  .badge-done{background:var(--good);color:#0D0D10;}
  .badge-skip{background:var(--card-2);color:var(--muted);}
  .badge-once{background:var(--accent);color:#0D0D10;}
  .quest-card.done .quest-bg{filter:saturate(.6) brightness(.7);}
  .quest-card.skip .quest-bg{filter:grayscale(.7) brightness(.6);}

  /* Aktionsebene */
  .quest-act{position:absolute;inset:0;display:none;flex-direction:column;gap:8px;padding:10px;
    background:rgba(13,13,16,.84);backdrop-filter:blur(3px);align-items:center;justify-content:center;}
  .quest-card.acting .quest-act{display:flex;}
  .quest-card.acting .quest-overlay{opacity:.12;}
  .act-controls{position:absolute;top:8px;right:8px;display:flex;gap:6px;}
  .mini-btn{background:rgba(13,13,16,.5);border:1px solid rgba(245,240,234,.2);color:#e8e0d6;
    width:32px;height:32px;border-radius:9px;font-size:.85rem;padding:0;line-height:1;}
  .act-row{display:flex;gap:8px;width:100%;}
  .act-btn{flex:1;height:44px;border-radius:12px;font-size:.95rem;font-weight:800;padding:0 8px;
    display:flex;align-items:center;justify-content:center;}
  .act-done{background:var(--good);color:#0D0D10;}
  .act-skip{background:var(--bad);color:#0D0D10;}
  .act-confirm{background:var(--action);color:#F5F0EA;}
  .act-back{background:rgba(245,240,234,.15);color:var(--text);flex:0 0 44px;font-size:1.3rem;font-weight:700;}
  .act-btn.on{outline:3px solid var(--text);outline-offset:-3px;}
  .bonus-hint{font-size:.66rem;color:var(--muted);text-align:center;margin-bottom:-2px;}
  .act-stars{display:flex;gap:10px;justify-content:center;font-size:1.5rem;line-height:1;}

  .penalty{background:rgba(255,77,107,.10);border:1px solid var(--bad);border-radius:12px;padding:11px 13px;margin-bottom:8px;}

  /* ---- Einmalig erledigt ---- */
  .done-item{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);}
  .done-item:last-child{border-bottom:none;}
  .done-icon{width:34px;height:34px;border-radius:9px;background:var(--card-2);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;}
  .done-icon svg{width:20px;height:20px;}

  /* ---- Wochenstatistik ---- */
  .weekwrap{display:flex;align-items:flex-end;gap:24px;height:130px;padding-top:8px;justify-content:center;}
  .weekbar{display:flex;flex-direction:column;align-items:center;gap:8px;width:74px;}
  .weekbar .bar{width:56px;border-radius:10px 10px 4px 4px;transition:height .5s ease;min-height:6px;}
  .weekbar .cnt{font-weight:800;font-size:1.1rem;}
  .weekbar .lbl{font-size:.72rem;color:var(--muted);font-weight:600;}
  .delta{font-weight:800;font-size:1.1rem;}

  #addQuestForm{display:none;}
  #addQuestForm.open{display:block;}
  .empty{text-align:center;color:var(--muted);padding:24px 0;font-size:.9rem;}

  footer{margin-top:28px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  #fileImport{display:none;}

  /* ---- Modals ---- */
  .modal-fs{position:fixed;inset:0;z-index:60;background:rgba(13,13,16,.92);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;padding:24px;}
  .modal-fs.show{display:flex;}
  .modal-inner{background:var(--card);border:1px solid var(--line);border-radius:22px;
    padding:26px 22px;max-width:360px;width:100%;text-align:center;}
  .modal-inner .art{width:120px;height:120px;margin:0 auto 6px;}
  .modal-inner h3{font-size:1.5rem;font-weight:800;letter-spacing:-.03em;margin:6px 0 6px;}
  .modal-inner .flavor{color:var(--muted);font-size:.9rem;margin-bottom:20px;}
  .modal-inner .close{width:100%;background:var(--action);color:#F5F0EA;padding:13px;font-size:1rem;}
  .attr-detail .big{font-size:2.6rem;font-weight:800;letter-spacing:-.03em;line-height:1;}
  .attr-detail .chg{font-weight:800;font-size:1rem;margin-top:2px;}
  .attr-detail .spark{margin:18px 0;}
  .modal-inner .sub{color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;font-weight:700;}

  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--card-2);
    border:1px solid var(--accent);padding:11px 20px;border-radius:999px;font-size:.85rem;
    opacity:0;pointer-events:none;transition:opacity .3s;z-index:70;font-weight:600;}
  #toast.show{opacity:1;}
</style>
</head>
<body>

<h1>⚔️ QuestLife</h1>

<div class="card" id="charCard">
  <div class="row between" style="align-items:flex-start;">
    <div style="flex:1;min-width:0;">
      <div class="lvl-line">
        <b id="levelLabel">Level 1</b>
        <span class="rank" id="rankLabel">F-RANK</span>
      </div>
      <div class="muted small" id="xpLabel" style="margin-top:4px;">Ø 1.00</div>
      <div class="xpbar-track"><div class="xpbar-fill" id="xpFill" style="width:0%"></div></div>
      <span class="pill" id="streakSummary" style="margin-top:9px;">🔥 0 Streaks</span>
    </div>
    <div class="day-big">
      <span class="wd" id="weekdayLabel">Montag</span>
      <span class="display"><span class="of">Tag </span><span class="num" id="dayNum">1</span></span>
    </div>
  </div>
  <div id="attrList" style="margin-top:16px;"></div>
</div>

<div class="card" id="rewardCard">
  <label>🎁 Belohnung für den nächsten Rang</label>
  <input id="rewardInput" placeholder="z.B. neues Spiel, Kinoabend …" oninput="onRewardInput()">
  <div class="muted small" id="rewardStatus"></div>
</div>

<div id="penaltySection"></div>

<div class="row between" style="margin-top:26px;">
  <h2 style="margin:0;">Heutige Quests</h2>
  <div class="addbtns">
    <button class="btn-primary btn-sm" onclick="openAddForm()">+ Quest</button>
    <button class="btn-ghost btn-sm" onclick="openAddOneTime()">+ Einmal</button>
  </div>
</div>

<div class="card" id="addQuestForm">
  <b id="formTitle" style="font-weight:800;">Neue Quest</b>
  <label>Name der Quest</label>
  <input id="newQuestName" placeholder="z.B. 20 Min lesen">
  <label>Attribut</label>
  <select id="newQuestAttr">
    <option value="koerper">Körper</option>
    <option value="geist">Geist</option>
    <option value="seele">Seele</option>
    <option value="moneymaking">Money-Making</option>
  </select>
  <div id="daysSection">
    <label>Wochentage</label>
    <div class="daychips" id="daysChips"></div>
  </div>
  <div id="penaltyRow">
    <label>Strafe bei Verpassen (optional, freier Text)</label>
    <input id="newQuestPenalty" placeholder="z.B. morgen doppelt machen">
  </div>
  <div class="row" style="margin-top:14px;">
    <button class="btn-primary" id="submitBtn" onclick="submitQuest()">Quest anlegen</button>
    <button class="btn-ghost" onclick="closeForm()">Abbrechen</button>
  </div>
</div>

<div id="questList"></div>

<div id="oneTimeDoneSection"></div>

<h2>Diese Woche</h2>
<div class="card" id="weekCard"></div>

<footer>
  <button class="btn-ghost btn-sm" onclick="exportData()">⬇️ Backup exportieren</button>
  <button class="btn-ghost btn-sm" onclick="document.getElementById('fileImport').click()">⬆️ Backup importieren</button>
  <input type="file" id="fileImport" accept="application/json" onchange="importData(event)">
</footer>

<div id="toast"></div>

<!-- Achievement-Modal -->
<div class="modal-fs" id="achievementModal">
  <div class="modal-inner">
    <div class="art" id="achArt"></div>
    <div class="sub" id="achSub">Achievement</div>
    <h3 id="achTitle">Titel</h3>
    <div class="flavor" id="achFlavor">Flavor</div>
    <button class="close" onclick="nextAchievement()">Got it</button>
  </div>
</div>

<!-- Attribut-Detail-Modal -->
<div class="modal-fs" id="attrModal">
  <div class="modal-inner attr-detail" id="attrModalInner"></div>
</div>

<script>
const STORAGE_KEY = 'questlife_v1';
const ATTR_LABELS = {koerper:'Körper', geist:'Geist', seele:'Seele', moneymaking:'Money-Making'};
const MILESTONES = [7,30,66];
const WEEKDAY_NAMES = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'];
const WEEKDAY_ABBR  = ['Mo','Di','Mi','Do','Fr','Sa','So'];

/* ---- Ränge (basierend auf Gesamt-Level) ---- */
const RANKS = [
  {name:'F', min:1,   color:'#8B5E34'},
  {name:'E', min:16,  color:'#CD7F32'},
  {name:'D', min:31,  color:'#C0C0C0'},
  {name:'C', min:46,  color:'#E5B80B'},
  {name:'B', min:61,  color:'#4A7FE0'},
  {name:'A', min:76,  color:'#9B59D0'},
  {name:'S', min:100, color:'#E5E9F0'}
];
function rankIndexForLevel(lvl){ let idx=0; for(let i=0;i<RANKS.length;i++){ if(lvl>=RANKS[i].min) idx=i; } return idx; }
function rankForLevel(lvl){ return RANKS[rankIndexForLevel(lvl)]; }

/* ---------- Datum-Helfer ---------- */
function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayStr(){ return fmt(new Date()); }
function shiftDate(base, delta){ const d=new Date(base+'T00:00:00'); d.setDate(d.getDate()+delta); return fmt(d); }
function daysBetween(a,b){ return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000); }
function isoWeekday(dateStr){ const d=new Date(dateStr+'T00:00:00'); return (d.getDay()+6)%7 + 1; } // 1=Mo .. 7=So

/* ---------- XP-Formel ---------- */
// XP einer Erledigung = gewählte Schwierigkeit (1-5) × 10. Kein Zeitfaktor mehr.
function computeXP(difficulty){ return (difficulty||0)*10; }

/* ---------- XP / Attribut-Level ---------- */
function xpForLevel(n){ return Math.round(50 * Math.pow(n, 1.5)); }
function levelFromXP(xp){ let level=1; while(xp >= xpForLevel(level)) level++; return level; }
function xpProgress(xp){
  const level = levelFromXP(xp);
  const prev = level===1 ? 0 : xpForLevel(level-1);
  const next = xpForLevel(level);
  return {level, current: xp-prev, needed: next-prev};
}
function gesamtAvgOf(attrs){
  const keys = Object.keys(ATTR_LABELS);
  const sum = keys.reduce((a,k)=>a+levelFromXP(attrs[k]||0),0);
  return sum/keys.length;
}
function gesamtLevelOf(attrs){ return Math.floor(gesamtAvgOf(attrs)); }
function computeGesamtLevel(){ return gesamtLevelOf(state.attributes); }

/* ---------- State ---------- */
function defaultState(){
  return {
    startDate: todayStr(),
    lastActiveDate: todayStr(),
    totalXP: 0,           // reine Info: insgesamt gesammelte XP (NICHT mehr für Level)
    attributes: {koerper:0, geist:0, seele:0, moneymaking:0},
    quests: [],           // {id,name,attribute,penaltyText,days:[1..7],streak,lastCompletedDate,lastCompletedXP,lastSkippedDate,active,image,oneTime}
    oneTimeDone: [],      // {id,name,attribute,xp,date,image} – neueste zuerst
    penalties: [],        // {id,questName,date,text,resolved}
    history: {},          // date -> {completedIds:[...], skippedIds:[...]}
    attrHistory: {},      // date -> {attr: value}
    shownLevel: 1,        // höchstes Gesamt-Level, für das ein Popup gezeigt wurde
    shownRank: 0,         // höchster Rang-Index, für den ein Popup gezeigt wurde
    shownStreaks: {},     // "questId-milestone" -> true
    miscImageCounter: 0,  // Rundlauf-Index (0-8) für den Misc-Bild-Pool
    rankReward: {text:'', lastCelebratedRank:null}   // Belohnung für den nächsten Rang-Aufstieg
  };
}

function hydrate(parsed){
  const s = Object.assign(defaultState(), parsed || {});
  const oa = s.attributes || {};
  const hadNewSchema = ('koerper' in oa)||('geist' in oa)||('seele' in oa)||('moneymaking' in oa);
  // Attribute IMMER auf das neue 4er-Schema bringen (alte 5 Attribute + Werte fallen weg)
  s.attributes = {koerper:+oa.koerper||0, geist:+oa.geist||0, seele:+oa.seele||0, moneymaking:+oa.moneymaking||0};
  s.attrHistory = s.attrHistory || {};
  s.shownStreaks = s.shownStreaks || {};
  s.oneTimeDone = Array.isArray(s.oneTimeDone) ? s.oneTimeDone : [];
  if(typeof s.miscImageCounter !== 'number') s.miscImageCounter = 0;
  if(!hadNewSchema){ s.totalXP = 0; }   // Schema-Reset: XP-Info-Topf mit-resetten
  (s.quests||[]).forEach(q=>{
    if(!('lastSkippedDate' in q)) q.lastSkippedDate = null;
    if(!('lastCompletedXP' in q)) q.lastCompletedXP = null;
    if(!('image' in q)) q.image = assignImage(q.name, s);
    if('scene' in q) delete q.scene;
    if(!('oneTime' in q)) q.oneTime = false;
    if(!Array.isArray(q.days)) q.days = [1,2,3,4,5,6,7];
    if(!ATTR_LABELS[q.attribute]) q.attribute = 'koerper';   // ungültiges Alt-Attribut abfangen
    delete q.difficulty; delete q.duration; delete q.xp;      // Altfelder entfernen
    if(typeof q.streak !== 'number') q.streak = 0;
  });
  for(const d in s.history){ if(!s.history[d].skippedIds) s.history[d].skippedIds = []; }
  // Rang-Belohnung (ersetzt die alte Wochenbelohnung)
  if(!s.rankReward || typeof s.rankReward !== 'object'){
    s.rankReward = {text:'', lastCelebratedRank:null};
  } else {
    if(typeof s.rankReward.text !== 'string') s.rankReward.text = '';
    if(!('lastCelebratedRank' in s.rankReward)) s.rankReward.lastCelebratedRank = null;
  }
  // Alt-Wochenbelohnungstext einmalig übernehmen, falls noch keine Rang-Belohnung gesetzt
  if(!s.rankReward.text && s.weeklyReward && typeof s.weeklyReward.text==='string'){
    s.rankReward.text = s.weeklyReward.text;
  }
  delete s.weeklyReward;
  // Level-/Rang-Popup-Merker auf aktuellen Stand setzen (kein Spam nach Reset/Erststart)
  const gl = gesamtLevelOf(s.attributes);
  if(!hadNewSchema || typeof s.shownLevel !== 'number') s.shownLevel = gl;
  if(!hadNewSchema || typeof s.shownRank  !== 'number') s.shownRank  = rankIndexForLevel(gl);
  return s;
}

let state = load();

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    return hydrate(JSON.parse(raw));
  }catch(e){
    console.error('Ladefehler, starte neu', e);
    return defaultState();
  }
}
function save(){
  state.attrHistory[todayStr()] = Object.assign({}, state.attributes);
  pruneHistory();
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    console.error('Speicherfehler', e);
    showToast('⚠️ Speichern fehlgeschlagen');
  }
}
function pruneHistory(){
  const cutoff = shiftDate(todayStr(), -180);
  for(const d in state.attrHistory){ if(d < cutoff) delete state.attrHistory[d]; }
  for(const d in state.history){ if(d < cutoff) delete state.history[d]; }
}

function uid(){ return 'q' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

/* ---------- Bild-Zuweisung (echte Fotos in images/) ----------
   Einmalig bei Quest-Anlage fix zugewiesen (quest.image). Kategorie-Keywords
   zuerst (erstes Match gewinnt, Teilstring, Kleinschreibung); kein Treffer ->
   nächstes Bild aus dem 9er-Misc-Pool über state.miscImageCounter. */

/* ---------- Quest-Status / Aktionsebene ---------- */
function questStatus(q){
  const t = todayStr();
  if(q.lastCompletedDate === t) return 'done';
  if(q.lastSkippedDate === t) return 'skip';
  return 'none';
}
function histToday(){
  const t = todayStr();
  if(!state.history[t]) state.history[t] = {completedIds:[], skippedIds:[]};
  return state.history[t];
}
function listAdd(arr,id){ if(arr.indexOf(id)===-1) arr.push(id); }
function listRemove(arr,id){ const i=arr.indexOf(id); if(i!==-1) arr.splice(i,1); }

let openQuestId = null;
let actStage = 'buttons';   // 'buttons' | 'stars'
let doneStars = 3;          // im Done-Flow gewählte Schwierigkeit (1-5)

function toggleActing(id, ev){
  if(ev) ev.stopPropagation();
  if(openQuestId===id){ openQuestId = null; }
  else { openQuestId = id; actStage = 'buttons'; doneStars = 3; }
  render();
}

// Kernfunktion (nur normale Quests): setzt Zielstatus, verrechnet alten Status gegen
function applyStatus(q, next, xpAmount){
  const id = q.id, t = todayStr();
  const cur = questStatus(q);
  if(cur==='done'){
    const amt = (q.lastCompletedXP!=null ? q.lastCompletedXP : 0);
    q.lastCompletedDate = null; q.lastCompletedXP = null;
    q.streak = Math.max(0, q.streak-1);
    state.attributes[q.attribute] = Math.max(0, (state.attributes[q.attribute]||0) - amt);
    state.totalXP = Math.max(0, state.totalXP - amt);
    listRemove(histToday().completedIds, id);
    MILESTONES.forEach(m=>{ if(q.streak < m) delete state.shownStreaks[id+'-'+m]; });
  } else if(cur==='skip'){
    q.lastSkippedDate = null;
    listRemove(histToday().skippedIds, id);
  }
  if(next==='done'){
    const amt = xpAmount||0;
    q.lastCompletedDate = t; q.lastCompletedXP = amt;
    q.streak += 1;
    state.attributes[q.attribute] = (state.attributes[q.attribute]||0) + amt;
    state.totalXP += amt;
    listAdd(histToday().completedIds, id);
    checkLevelUp();
    MILESTONES.forEach(m=>{
      const key = id+'-'+m;
      if(q.streak===m && !state.shownStreaks[key]){ state.shownStreaks[key]=true; queueStreak(q, m); }
    });
  } else if(next==='skip'){
    q.lastSkippedDate = t;
    listAdd(histToday().skippedIds, id);
  }
}

// Einmal-Quest abschließen: XP gutschreiben, in Verlauf schieben, aus aktiver Liste entfernen
function completeOneTime(q, xp){
  state.attributes[q.attribute] = (state.attributes[q.attribute]||0) + xp;
  state.totalXP += xp;
  listAdd(histToday().completedIds, q.id);
  state.oneTimeDone.unshift({id:q.id, name:q.name, attribute:q.attribute, xp, date:todayStr(), image:q.image});
  state.quests = state.quests.filter(x=>x.id!==q.id);
  checkLevelUp();
}

// Einfaches Toggle (Skip-Button, Done-Undo bei normalen Quests)
function markQuest(id, action, ev){
  if(ev) ev.stopPropagation();
  const q = state.quests.find(x=>x.id===id); if(!q) return;
  const cur = questStatus(q);
  applyStatus(q, cur===action ? 'none' : action, 0);
  openQuestId = null;
  save(); render(); flushAchievements();
}

// Done angetippt: bereits erledigt -> Undo; sonst Sterne-Auswahl öffnen
function onDonePressed(id, ev){
  if(ev) ev.stopPropagation();
  const q = state.quests.find(x=>x.id===id); if(!q) return;
  if(!q.oneTime && questStatus(q)==='done'){ markQuest(id,'done'); return; }  // rückgängig
  openQuestId = id; actStage = 'stars'; doneStars = 3; render();
}
function onSkipPressed(id, ev){ if(ev) ev.stopPropagation(); markQuest(id,'skip'); }
function setDoneStars(n, ev){ if(ev) ev.stopPropagation(); doneStars = n; render(); }
function actBack(ev){ if(ev) ev.stopPropagation(); actStage = 'buttons'; render(); }
function confirmDone(id, ev){
  if(ev) ev.stopPropagation();
  const q = state.quests.find(x=>x.id===id); if(!q) return;
  const xp = computeXP(doneStars);
  if(q.oneTime){ completeOneTime(q, xp); }
  else { applyStatus(q, 'done', xp); }
  openQuestId = null; actStage = 'buttons'; doneStars = 3;
  save(); render(); flushAchievements();
}

function resolvePenalty(id){
  const p = state.penalties.find(p=>p.id===id);
  if(p) p.resolved = true;
  save(); render();
}

/* ---------- Tages-Rollover (wochentag-bewusst) ----------
   Für jede vergangene Tageslücke (lastActiveDate .. gestern): eine normale Quest
   nur werten, wenn dieser Wochentag in quest.days liegt. Verpasst (weder Done
   noch Skip an geplantem Tag) -> Streak reißt + Strafe. Nicht geplante Tage
   werden komplett ignoriert. Einmal-Quests sind ausgenommen. */
function processDayRollover(){
  const today = todayStr();
  if(state.lastActiveDate === today) return;
  let d = state.lastActiveDate, guard = 0;
  while(d < today && guard < 400){
    const wd = isoWeekday(d);
    const h = state.history[d];
    state.quests.forEach(q=>{
      if(!q.active || q.oneTime) return;
      if(!Array.isArray(q.days) || q.days.indexOf(wd)===-1) return;   // an diesem Tag nicht geplant
      const done = h && h.completedIds && h.completedIds.indexOf(q.id)!==-1;
      const skip = h && h.skippedIds  && h.skippedIds.indexOf(q.id)!==-1;
      if(!done && !skip && q.streak > 0){
        q.streak = 0;
        MILESTONES.forEach(m=>delete state.shownStreaks[q.id+'-'+m]);
        if(q.penaltyText){
          state.penalties.push({id:uid(), questName:q.name, date:today, text:q.penaltyText, resolved:false});
        }
      }
    });
    d = shiftDate(d, 1); guard++;
  }
  state.lastActiveDate = today;
  save();
}

/* ---------- Attribut-Detail ---------- */
function attrValueAt(attr, dateStr){
  let best=null, val=0;
  for(const d in state.attrHistory){
    if(d<=dateStr && (best===null || d>best)){ best=d; val=state.attrHistory[d][attr]||0; }
  }
  return best===null ? 0 : val;
}
function openAttrDetail(attr){
  const t = todayStr();
  const cur = state.attributes[attr]||0;
  const prog = xpProgress(cur);
  const change = cur - attrValueAt(attr, shiftDate(t,-7));
  const vals = [];
  for(let i=13;i>=0;i--) vals.push(attrValueAt(attr, shiftDate(t,-i)));
  const chgColor = change>0 ? 'var(--good)' : (change<0 ? 'var(--bad)' : 'var(--muted)');
  const chgText = (change>0?'+':'') + change;
  document.getElementById('attrModalInner').innerHTML = `
    <div class="sub">${ATTR_LABELS[attr]} · Level ${prog.level}</div>
    <div class="big" style="margin-top:6px;">${cur}<span class="muted" style="font-size:1rem;font-weight:600;"> XP</span></div>
    <div class="chg" style="color:${chgColor};">${chgText} <span class="muted small" style="font-weight:600;">letzte 7 Tage · ${prog.current}/${prog.needed} bis Lv ${prog.level+1}</span></div>
    <div class="spark">${sparkline(vals)}</div>
    <div class="muted small" style="margin-bottom:18px;">Verlauf der letzten 14 Tage</div>
    <button class="close" onclick="closeAttrModal()">Schließen</button>`;
  document.getElementById('attrModal').classList.add('show');
}
function closeAttrModal(){ document.getElementById('attrModal').classList.remove('show'); }

function sparkline(vals){
  const W=280, H=64, pad=6;
  const min=Math.min(...vals), max=Math.max(...vals);
  const range = (max-min)||1;
  const n = vals.length;
  const pts = vals.map((v,i)=>{
    const x = pad + (i/(n-1))*(W-2*pad);
    const y = H-pad - ((v-min)/range)*(H-2*pad);
    return x.toFixed(1)+','+y.toFixed(1);
  });
  const line = pts.join(' ');
  const area = `${pad},${H-pad} ${line} ${W-pad},${H-pad}`;
  const last = pts[pts.length-1].split(',');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="spg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF7A1A" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FF7A1A" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${area}" fill="url(#spg)"/>
    <polyline points="${line}" fill="none" stroke="#FF7A1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="3.5" fill="#FF7A1A"/>
  </svg>`;
}

function exportData(){

  a.href = url; a.download = 'questlife-backup-' + todayStr() + '.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('Backup exportiert');
}
function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const parsed = JSON.parse(e.target.result);
      if(!confirm('Import überschreibt deinen aktuellen Stand. Fortfahren?')){ event.target.value=''; return; }
      state = hydrate(parsed);
      save(); render();
      showToast('Backup importiert');
    }catch(err){
      alert('Datei konnte nicht gelesen werden: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

  const t = todayStr(); let c=0;
  for(let i=fromOffset;i<=toOffset;i++){
    const h = state.history[shiftDate(t,-i)];
    if(h && h.completedIds) c += h.completedIds.length;
  }
  return c;
}

  heart:'<path d="M12 20 C5 14 4 9.5 6.8 6.8 c2-1.9 4.2-.8 5.2 1.1 c1-1.9 3.2-3 5.2-1.1 C20 9.5 19 14 12 20Z"/>',
  star:'<path d="M12 3 l2.6 6 6.4 .5 -4.9 4.2 1.5 6.3 -5.6-3.4 -5.6 3.4 1.5-6.3 -4.9-4.2 6.4-.5Z"/>'
};
function iconSVG(name){
  return `<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">${ICONS[name]||ICONS.star}</svg>`;
}

/* ================= Achievement-Illustrationen ================= */

    <defs><linearGradient id="alv" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffd89b"/><stop offset="1" stop-color="#FF7A1A"/></linearGradient></defs>
    <circle cx="60" cy="60" r="52" fill="#FF7A1A" opacity="0.12"/>
    <path d="M60 18 l11 24 26 3 -19 18 5 26 -23-13 -23 13 5-26 -19-18 26-3Z" fill="url(#alv)"/>
    <text x="60" y="69" text-anchor="middle" font-size="26" font-weight="800" fill="#0D0D10" font-family="-apple-system,sans-serif">${level}</text>
  </svg>`;
}

    <circle cx="60" cy="60" r="52" fill="#FF4D6B" opacity="0.12"/>

function rankIllustration(rk){

    <circle cx="60" cy="60" r="52" fill="${rk.color}" opacity="0.16"/>
    <path d="M60 16 L96 30 V60 C96 82 80 98 60 106 C40 98 24 82 24 60 V30 Z" fill="${rk.color}" opacity="0.30" stroke="${rk.color}" stroke-width="3" stroke-linejoin="round"/>

/* ================= RENDER ================= */
function render(){
  const today = todayStr();
  const todayWd = isoWeekday(today);

  // Header: Gesamt-Level (Ø der 4 Attribut-Level) + Rang
  const avg = gesamtAvgOf(state.attributes);
  const gesamt = Math.floor(avg);
  document.getElementById('levelLabel').textContent = 'Level ' + gesamt;
  document.getElementById('xpFill').style.width = ((avg - gesamt) * 100).toFixed(1) + '%';
  document.getElementById('xpLabel').textContent = 'Ø ' + avg.toFixed(2) + ' · ' + state.totalXP + ' XP gesamt';
  const rk = rankForLevel(gesamt);
  const rankEl = document.getElementById('rankLabel');
  rankEl.textContent = rk.name + '-RANK'; rankEl.style.color = rk.color;

  document.getElementById('weekdayLabel').textContent = WEEKDAY_NAMES[todayWd-1];
  document.getElementById('dayNum').textContent = daysBetween(state.startDate, today) + 1;

  const activeStreaks = state.quests.filter(q=>q.active && !q.oneTime && q.streak>0).length;
  document.getElementById('streakSummary').textContent = '🔥 ' + activeStreaks + ' Streak' + (activeStreaks===1?'':'s');

  // Wochenbelohnung
  const ri = document.getElementById('rewardInput');
  if(document.activeElement !== ri) ri.value = state.rankReward.text || '';
  document.getElementById('rewardStatus').innerHTML = rewardStatusText();

  // Attribute (eigenes Level pro Attribut, Balken = Fortschritt im aktuellen Level)
  const attrList = document.getElementById('attrList');
  attrList.innerHTML = Object.keys(ATTR_LABELS).map(key=>{
    const val = state.attributes[key] || 0;
    const prog = xpProgress(val);
    const w = prog.needed>0 ? Math.min(100,(prog.current/prog.needed)*100) : 100;
    return `<div class="attr-row" onclick="openAttrDetail('${key}')">
        <div class="attr-name">${ATTR_LABELS[key]}</div>
        <div class="attr-lvl">Lv ${prog.level}</div>
        <div class="attr-track"><div class="attr-fill" style="width:${w}%"></div></div>
        <div class="attr-val">${val}</div>
        <div class="attr-chev">›</div>
      </div>`;
  }).join('');

  // Strafen
  const penSection = document.getElementById('penaltySection');
  const openPenalties = state.penalties.filter(p=>!p.resolved);
  penSection.innerHTML = openPenalties.length ? '<h2>Offene Strafen</h2>' + openPenalties.map(p=>`
      <div class="penalty">
        <div class="row between">
          <div><b>${escapeHtml(p.questName)}</b><div class="muted small">${escapeHtml(p.text)}</div></div>
          <button class="btn-ghost btn-sm" onclick="resolvePenalty('${p.id}')">Erledigt</button>
        </div>
      </div>`).join('') : '';

  // Quest-Karten – nur heute geplante (oder Einmal-Quests)
  const list = document.getElementById('questList');
  const active = state.quests.filter(q=>q.active && (q.oneTime || (Array.isArray(q.days) && q.days.indexOf(todayWd)!==-1)));
  if(active.length===0){
    const anyActive = state.quests.some(q=>q.active);
    list.innerHTML = '<div class="card"><div class="empty">' +
      (anyActive ? 'Heute keine Quests geplant. 🌙' : 'Noch keine Quests. Leg deine erste über "+ Quest" an.') +
      '</div></div>';
  } else {
    list.innerHTML = active.map(q=>{
      const st = questStatus(q);
      const acting = openQuestId===q.id;
      const badges = [];
      if(q.oneTime){
        badges.push('<span class="pill badge-once">Einmalig</span>');
      } else {
        if(st==='done') badges.push('<span class="pill badge-done">✓ Erledigt</span>');
        else if(st==='skip') badges.push('<span class="pill badge-skip">⏸ Pausiert</span>');
        badges.push('<span class="pill">🔥 '+q.streak+'</span>');
      }

      let actPanel;
      if(acting && actStage==='stars'){
        const xpPrev = computeXP(doneStars);
        const starsHtml = [1,2,3,4,5].map(i=>`<span class="star ${i<=doneStars?'on':''}" onclick="setDoneStars(${i},event)">★</span>`).join('');
        actPanel = `
          <div class="bonus-hint">Wie schwer war's? · ${xpPrev} XP</div>
          <div class="act-stars">${starsHtml}</div>
          <div class="act-row">
            <button class="act-btn act-back" onclick="actBack(event)">‹</button>
            <button class="act-btn act-confirm" onclick="confirmDone('${q.id}',event)">✓ ${xpPrev} XP gutschreiben</button>
          </div>`;
      } else {
        const actionRow = q.oneTime
          ? `<div class="act-row"><button class="act-btn act-done" onclick="onDonePressed('${q.id}',event)">✓ Erledigt</button></div>`
          : `<div class="act-row">
               <button class="act-btn act-done ${st==='done'?'on':''}" onclick="onDonePressed('${q.id}',event)">✓ Done</button>
               <button class="act-btn act-skip ${st==='skip'?'on':''}" onclick="onSkipPressed('${q.id}',event)">Skip</button>
             </div>`;
        actPanel = `
          <div class="act-controls">
            <button class="mini-btn" onclick="openEditForm('${q.id}',event)">✏️</button>
            <button class="mini-btn" onclick="deleteQuest('${q.id}',event)">🗑</button>
          </div>
          ${actionRow}`;
      }

      return `<div class="quest-card ${st} ${acting?'acting':''}" data-qid="${q.id}" onclick="toggleActing('${q.id}',event)">
        <img class="quest-bg" loading="lazy" src="images/${q.image}" alt="">
        <div class="quest-overlay">
          <div class="quest-top">
            <div class="quest-icon">${iconSVG(matchIcon(q.name))}</div>
            <div class="quest-badges">${badges.join('')}</div>
          </div>
          <div>
            <div class="quest-title">${escapeHtml(q.name)}</div>
            <div class="quest-sub">
              <span>${ATTR_LABELS[q.attribute]||q.attribute}</span>
              ${(!q.oneTime && q.penaltyText) ? '<span>⚠️ '+escapeHtml(q.penaltyText)+'</span>' : ''}
            </div>
          </div>
        </div>
        <div class="quest-act">${actPanel}</div>
      </div>`;
    }).join('');
  }

  // Einmalig erledigt
  const otd = document.getElementById('oneTimeDoneSection');
  if(state.oneTimeDone.length){
    otd.innerHTML = '<h2>Einmalig erledigt</h2><div class="card">' + state.oneTimeDone.map(e=>`
      <div class="done-item">
        <div class="done-icon">${iconSVG(matchIcon(e.name))}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:700;">${escapeHtml(e.name)}</div>
          <div class="muted small">${ATTR_LABELS[e.attribute]||e.attribute} · +${e.xp} XP · ${e.date}</div>
        </div>
      </div>`).join('') + '</div>';
  } else {
    otd.innerHTML = '';
  }

  renderWeek();
}

function renderWeek(){
  const thisWeek = countCompleted(0,6);
  const lastWeek = countCompleted(7,13);
  const max = Math.max(1, thisWeek, lastWeek);
  const h = v => Math.round((v/max)*110) + 6;
  let deltaHtml;
  if(lastWeek===0){
    deltaHtml = thisWeek>0 ? '<span class="delta" style="color:var(--good);">Neu</span>' : '<span class="delta muted">–</span>';
  } else {
    const pct = Math.round(((thisWeek-lastWeek)/lastWeek)*100);
    const col = pct>0?'var(--good)':(pct<0?'var(--bad)':'var(--muted)');
    deltaHtml = `<span class="delta" style="color:${col};">${pct>0?'+':''}${pct}%</span>`;
  }
  document.getElementById('weekCard').innerHTML = `
    <div class="row between" style="margin-bottom:4px;">
      <span class="muted small">Erledigte Quests (rollierende 7 Tage)</span>${deltaHtml}
    </div>
    <div class="weekwrap">
      <div class="weekbar">
        <div class="cnt muted">${lastWeek}</div>
        <div class="bar" style="height:${h(lastWeek)}px;background:var(--card-2);"></div>
        <div class="lbl">Vorwoche</div>
      </div>
      <div class="weekbar">
        <div class="cnt" style="color:var(--accent);">${thisWeek}</div>
        <div class="bar" style="height:${h(thisWeek)}px;background:linear-gradient(180deg,var(--accent),#b34f0f);"></div>
        <div class="lbl">Diese Woche</div>
      </div>
    </div>`;
}

/* ---------- Swipe zum Öffnen der Karte ---------- */
(function(){
  const list = document.getElementById('questList');
  let sx=null, qid=null;
  list.addEventListener('touchstart', e=>{
    const c = e.target.closest('.quest-card');
    if(c){ sx = e.touches[0].clientX; qid = c.dataset.qid; }
  }, {passive:true});
  list.addEventListener('touchend', e=>{
    if(sx!=null && qid){
      const dx = e.changedTouches[0].clientX - sx;
      if(Math.abs(dx) > 45){ openQuestId = qid; actStage='buttons'; doneStars=3; render(); }
    }
    sx=null; qid=null;
  });
})();

/* ---------- Init ---------- */
processDayRollover();
save();
render();
flushAchievements();
</script>
