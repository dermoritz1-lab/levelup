<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>QuestLife</title>
<link rel="manifest" href="data:application/manifest+json,{%22name%22:%22QuestLife%22,%22short_name%22:%22QuestLife%22,%22display%22:%22standalone%22,%22background_color%22:%22%23181022%22,%22theme_color%22:%22%23181022%22}">
<style>
  :root{
    --bg:#181022;
    --panel:#241a33;
    --panel-2:#2e2244;
    --line:#3c2c56;
    --text:#f0e8ff;
    --muted:#a897c4;
    --accent:#9d6bff;
    --accent-2:#ff9d6b;
    --good:#6bffa0;
    --bad:#ff6b8a;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  body{padding:16px;padding-bottom:80px;max-width:520px;margin:0 auto;}
  h1,h2,h3{margin:0 0 8px 0;}
  h1{font-size:1.4rem;}
  h2{font-size:1.05rem;color:var(--muted);font-weight:600;letter-spacing:.02em;text-transform:uppercase;margin-top:24px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
  .row{display:flex;align-items:center;gap:12px;}
  .between{justify-content:space-between;}
  .muted{color:var(--muted);font-size:.85rem;}
  .pill{display:inline-block;padding:2px 10px;border-radius:999px;background:var(--panel-2);font-size:.75rem;color:var(--muted);}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:12px;padding:10px 14px;font-size:.9rem;font-weight:600;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-ghost{background:var(--panel-2);color:var(--text);}
  .btn-danger{background:var(--bad);color:#fff;}
  .btn-sm{padding:6px 10px;font-size:.8rem;}
  input,select,textarea{font-family:inherit;background:var(--panel-2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:8px 10px;font-size:.9rem;width:100%;}
  label{font-size:.8rem;color:var(--muted);display:block;margin-bottom:4px;margin-top:10px;}

  /* Charakter-Header */
  #charCard{background:linear-gradient(160deg,var(--panel-2),var(--panel));position:relative;overflow:hidden;}
  .avatar{width:56px;height:56px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;}
  .xpbar-track{background:var(--panel-2);border-radius:999px;height:10px;overflow:hidden;margin-top:6px;}
  .xpbar-fill{background:linear-gradient(90deg,var(--accent),var(--accent-2));height:100%;border-radius:999px;transition:width .4s ease;}
  .attr-row{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:.8rem;}
  .attr-name{width:88px;color:var(--muted);flex-shrink:0;}
  .attr-track{flex:1;background:var(--panel-2);border-radius:999px;height:7px;overflow:hidden;}
  .attr-fill{height:100%;border-radius:999px;background:var(--good);}
  .day-badge{text-align:center;}
  .day-badge b{font-size:1.3rem;display:block;}

  /* Quests */
  .quest{display:flex;align-items:flex-start;gap:10px;padding:12px 0;border-bottom:1px solid var(--line);}
  .quest:last-child{border-bottom:none;}
  .check{width:26px;height:26px;border-radius:50%;border:2px solid var(--accent);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:transparent;color:transparent;font-size:.9rem;margin-top:2px;}
  .check.done{background:var(--good);border-color:var(--good);color:#123;}
  .quest-body{flex:1;min-width:0;}
  .quest-name{font-weight:600;}
  .quest-name.done{text-decoration:line-through;color:var(--muted);}
  .quest-meta{font-size:.75rem;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;}
  .quest-actions{display:flex;gap:6px;flex-shrink:0;}
  .icon-btn{background:transparent;color:var(--muted);padding:4px 6px;font-size:1rem;}

  .penalty{background:rgba(255,107,138,.12);border:1px solid var(--bad);border-radius:12px;padding:10px 12px;margin-bottom:8px;}
  .penalty .row{align-items:flex-start;}

  #addQuestForm{display:none;}
  #addQuestForm.open{display:block;}

  .empty{text-align:center;color:var(--muted);padding:24px 0;font-size:.9rem;}
  footer{margin-top:28px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel-2);border:1px solid var(--accent);padding:10px 18px;border-radius:999px;font-size:.85rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:50;}
  #toast.show{opacity:1;}
  #fileImport{display:none;}
</style>
</head>
<body>

<h1>⚔️ QuestLife</h1>

<div class="card" id="charCard">
  <div class="row between">
    <div class="row">
      <div class="avatar" id="avatarEmoji">🌱</div>
      <div>
        <div class="row" style="gap:6px;">
          <b id="levelLabel">Level 1</b>
          <span class="pill" id="streakSummary">🔥 0 aktive Streaks</span>
        </div>
        <div class="muted" id="xpLabel">0 / 50 XP</div>
        <div class="xpbar-track"><div class="xpbar-fill" id="xpFill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="day-badge">
      <b id="dayNum">1</b>
      <span class="muted">/ 66 Tage</span>
    </div>
  </div>

  <div id="attrList"></div>
</div>

<div id="penaltySection"></div>

<div class="row between" style="margin-top:24px;">
  <h2 style="margin:0;">Heutige Quests</h2>
  <button class="btn-primary btn-sm" onclick="toggleAddForm()">+ Quest</button>
</div>

<div class="card" id="addQuestForm">
  <label>Name der Quest</label>
  <input id="newQuestName" placeholder="z.B. 20 Min lesen">
  <label>Attribut</label>
  <select id="newQuestAttr">
    <option value="selbstvertrauen">Selbstvertrauen</option>
    <option value="disziplin">Disziplin</option>
    <option value="weisheit">Weisheit</option>
    <option value="fokus">Fokus</option>
    <option value="staerke">Stärke</option>
  </select>
  <label>XP bei Erledigung</label>
  <input id="newQuestXP" type="number" value="15" min="1">
  <label>Strafe bei Verpassen (optional, freier Text)</label>
  <input id="newQuestPenalty" placeholder="z.B. morgen doppelt machen">
  <div class="row" style="margin-top:12px;">
    <button class="btn-primary" onclick="addQuest()">Quest anlegen</button>
    <button class="btn-ghost" onclick="toggleAddForm()">Abbrechen</button>
  </div>
</div>

<div class="card" id="questListCard">
  <div id="questList"></div>
</div>

<footer>
  <button class="btn-ghost btn-sm" onclick="exportData()">⬇️ Backup exportieren</button>
  <button class="btn-ghost btn-sm" onclick="document.getElementById('fileImport').click()">⬆️ Backup importieren</button>
  <input type="file" id="fileImport" accept="application/json" onchange="importData(event)">
</footer>

<div id="toast"></div>

<script>
const STORAGE_KEY = 'questlife_v1';
const ATTR_LABELS = {selbstvertrauen:'Selbstvertrauen', disziplin:'Disziplin', weisheit:'Weisheit', fokus:'Fokus', staerke:'Stärke'};

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function daysBetween(a,b){
  const d1 = new Date(a+'T00:00:00');
  const d2 = new Date(b+'T00:00:00');
  return Math.round((d2-d1)/86400000);
}

function defaultState(){
  return {
    startDate: todayStr(),
    lastActiveDate: todayStr(),
    totalXP: 0,
    attributes: {selbstvertrauen:0, disziplin:0, weisheit:0, fokus:0, staerke:0},
    quests: [],
    penalties: [], // {id, questName, date, text, resolved}
    history: {}    // date -> {completedIds:[...]}
  };
}

let state = load();

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed);
  }catch(e){
    console.error('Ladefehler, starte neu', e);
    return defaultState();
  }
}
function save(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    console.error('Speicherfehler', e);
    showToast('⚠️ Speichern fehlgeschlagen');
  }
}

// XP-Kurve: exponentiell. Schwelle für Level n (kumulativ von 0)
function xpForLevel(n){
  return Math.round(50 * Math.pow(n, 1.5));
}
function levelFromXP(totalXP){
  let level = 1;
  while(totalXP >= xpForLevel(level)){
    level++;
  }
  return level;
}
function xpProgress(totalXP){
  const level = levelFromXP(totalXP);
  const prevThreshold = level === 1 ? 0 : xpForLevel(level-1);
  const nextThreshold = xpForLevel(level);
  return {level, current: totalXP - prevThreshold, needed: nextThreshold - prevThreshold, prevThreshold, nextThreshold};
}

function uid(){
  return 'q' + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

function toggleAddForm(){
  document.getElementById('addQuestForm').classList.toggle('open');
}

function addQuest(){
  const name = document.getElementById('newQuestName').value.trim();
  const attr = document.getElementById('newQuestAttr').value;
  const xp = parseInt(document.getElementById('newQuestXP').value) || 10;
  const penaltyText = document.getElementById('newQuestPenalty').value.trim();
  if(!name){ showToast('Bitte einen Namen eingeben'); return; }
  state.quests.push({
    id: uid(),
    name, attribute: attr, xp,
    penaltyText: penaltyText || '',
    streak: 0,
    lastCompletedDate: null,
    active: true
  });
  document.getElementById('newQuestName').value='';
  document.getElementById('newQuestPenalty').value='';
  toggleAddForm();
  save();
  render();
}

function deleteQuest(id){
  if(!confirm('Diese Quest wirklich löschen? Streak-Historie geht verloren.')) return;
  state.quests = state.quests.filter(q=>q.id!==id);
  save();
  render();
}

function isCompletedToday(q){
  return q.lastCompletedDate === todayStr();
}

function toggleQuest(id){
  const q = state.quests.find(q=>q.id===id);
  if(!q) return;
  const today = todayStr();
  if(isCompletedToday(q)){
    // rückgängig machen
    q.lastCompletedDate = null;
    q.streak = Math.max(0, q.streak-1);
    state.totalXP = Math.max(0, state.totalXP - q.xp);
    state.attributes[q.attribute] = Math.max(0, state.attributes[q.attribute] - q.xp);
  } else {
    q.lastCompletedDate = today;
    q.streak += 1;
    state.totalXP += q.xp;
    state.attributes[q.attribute] = (state.attributes[q.attribute]||0) + q.xp;
  }
  if(!state.history[today]) state.history[today] = {completedIds:[]};
  const list = state.history[today].completedIds;
  const idx = list.indexOf(id);
  if(isCompletedToday(q) && idx===-1) list.push(id);
  if(!isCompletedToday(q) && idx!==-1) list.splice(idx,1);
  save();
  render();
}

function resolvePenalty(id){
  const p = state.penalties.find(p=>p.id===id);
  if(p) p.resolved = true;
  save();
  render();
}

// Beim Tageswechsel: verpasste Quests von gestern -> Streak reißt + Strafe eintragen
function processDayRollover(){
  const today = todayStr();
  if(state.lastActiveDate === today) return;

  const gap = daysBetween(state.lastActiveDate, today);
  // Für jeden Tag zwischen lastActiveDate (exklusiv) und heute (exklusiv) prüfen wir Quests
  // Vereinfachung: wir prüfen nur, ob am lastActiveDate die Quest erledigt wurde. Wenn nicht -> Streak reißt + Strafe.
  state.quests.forEach(q=>{
    const wasCompletedOnLastActive = q.lastCompletedDate === state.lastActiveDate;
    if(!wasCompletedOnLastActive || gap > 1){
      if(q.streak > 0 || gap === 1){
        q.streak = 0;
        if(q.penaltyText){
          state.penalties.push({
            id: uid(),
            questName: q.name,
            date: today,
            text: q.penaltyText,
            resolved: false
          });
        }
      }
    }
  });
  state.lastActiveDate = today;
  save();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

function exportData(){
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'questlife-backup-' + todayStr() + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup exportiert');
}

function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const parsed = JSON.parse(e.target.result);
      if(!confirm('Import überschreibt deinen aktuellen Stand. Fortfahren?')) return;
      state = Object.assign(defaultState(), parsed);
      save();
      render();
      showToast('Backup importiert');
    }catch(err){
      alert('Datei konnte nicht gelesen werden: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function render(){
  // Charakter-Header
  const prog = xpProgress(state.totalXP);
  document.getElementById('levelLabel').textContent = 'Level ' + prog.level;
  document.getElementById('xpLabel').textContent = prog.current + ' / ' + prog.needed + ' XP';
  const pct = prog.needed > 0 ? Math.min(100, (prog.current/prog.needed)*100) : 100;
  document.getElementById('xpFill').style.width = pct + '%';

  const activeStreaks = state.quests.filter(q=>q.streak>0).length;
  document.getElementById('streakSummary').textContent = '🔥 ' + activeStreaks + ' aktive Streak' + (activeStreaks===1?'':'s');

  const dayNum = Math.min(66, daysBetween(state.startDate, todayStr()) + 1);
  document.getElementById('dayNum').textContent = dayNum;

  // Avatar-Emoji je nach Level (rein Platzhalter, Design folgt später)
  const stages = ['🌱','🌿','🐣','🦊','🐉','👑'];
  const stageIdx = Math.min(stages.length-1, Math.floor((prog.level-1)/3));
  document.getElementById('avatarEmoji').textContent = stages[stageIdx];

  // Attribute
  const attrList = document.getElementById('attrList');
  attrList.innerHTML = '';
  const maxAttr = Math.max(1, ...Object.values(state.attributes));
  Object.keys(ATTR_LABELS).forEach(key=>{
    const val = state.attributes[key] || 0;
    const w = Math.min(100, (val/maxAttr)*100);
    attrList.innerHTML += `
      <div class="attr-row">
        <div class="attr-name">${ATTR_LABELS[key]}</div>
        <div class="attr-track"><div class="attr-fill" style="width:${w}%"></div></div>
        <div class="muted" style="width:36px;text-align:right;">${val}</div>
      </div>`;
  });

  // Strafen
  const penSection = document.getElementById('penaltySection');
  const openPenalties = state.penalties.filter(p=>!p.resolved);
  if(openPenalties.length){
    penSection.innerHTML = '<h2>Offene Strafen</h2>' + openPenalties.map(p=>`
      <div class="penalty">
        <div class="row between">
          <div>
            <b>${escapeHtml(p.questName)}</b>
            <div class="muted">${escapeHtml(p.text)}</div>
          </div>
          <button class="btn-ghost btn-sm" onclick="resolvePenalty('${p.id}')">Erledigt</button>
        </div>
      </div>`).join('');
  } else {
    penSection.innerHTML = '';
  }

  // Quest-Liste
  const list = document.getElementById('questList');
  const active = state.quests.filter(q=>q.active);
  if(active.length===0){
    list.innerHTML = '<div class="empty">Noch keine Quests. Leg deine erste über "+ Quest" an.</div>';
  } else {
    list.innerHTML = active.map(q=>{
      const done = isCompletedToday(q);
      return `
      <div class="quest">
        <button class="check ${done?'done':''}" onclick="toggleQuest('${q.id}')">${done?'✓':''}</button>
        <div class="quest-body">
          <div class="quest-name ${done?'done':''}">${escapeHtml(q.name)}</div>
          <div class="quest-meta">
            <span>${ATTR_LABELS[q.attribute]}</span>
            <span>+${q.xp} XP</span>
            <span>🔥 ${q.streak}</span>
            ${q.penaltyText ? '<span title="Strafe bei Verpassen">⚠️ '+escapeHtml(q.penaltyText)+'</span>' : ''}
          </div>
        </div>
        <div class="quest-actions">
          <button class="icon-btn" onclick="deleteQuest('${q.id}')">🗑️</button>
        </div>
      </div>`;
    }).join('');
  }
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Init
processDayRollover();
render();
</script>
</body>
</html>
